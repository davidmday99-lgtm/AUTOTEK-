              {
                  "title": "Why Midwest Shops Are Choosing Texa",
                  "category": "Industry News",
                  "content": "Across the Midwest — from St. Louis to Minneapolis and everywhere in between — independent shops and fleet operators are discovering what European technicians have known for years: Texa diagnostic tools deliver a level of capability and coverage that's hard to match. And with AutoTek now providing local sales and support, accessing that capability has never been easier.\n\nMidwest shops face some unique challenges that Texa is well-suited to address. The region's diverse vehicle population includes everything from domestic trucks and SUVs to European luxury cars to Asian imports to heavy-duty commercial vehicles. Having one diagnostic platform that covers all of these segments means less tool juggling and more productive diagnostic time. The extreme temperature swings — from brutal winters to sweltering summers — also create specific diagnostic scenarios around battery health, HVAC systems, and cold-start performance that require thorough diagnostic access.\n\nAutoTek is proud to serve as the Midwest's go-to Texa dealer. We understand the local market, we know the vehicles in our region, and we're here to provide the kind of hands-on support that a national mail-order company simply can't offer. Whether you're in downtown St. Louis, suburban Minneapolis, or a rural shop in between, we're your partner for professional diagnostic equipment. Call us at 314-922-3083 — we'd love to earn your business."
              }
          ]

          today = datetime.date.today()
          day_index = today.timetuple().tm_yday % len(TOPICS)
          topic = TOPICS[day_index]

          new_post = {
              "id": int(today.strftime("%Y%m%d")),
              "title": topic["title"],
              "date": today.isoformat(),
              "author": "Mike Miller",
              "category": topic["category"],
              "excerpt": topic["content"].split("\n\n")[0][:200] + "...",
              "content": topic["content"]
          }

          posts_path = os.path.join("data", "posts.json")
          try:
              with open(posts_path, "r") as f:
                  posts = json.load(f)
          except (FileNotFoundError, json.JSONDecodeError):
              posts = []

          # Don't add duplicate for today
          existing_ids = [p.get("id") for p in posts]
          if new_post["id"] not in existing_ids:
              posts.insert(0, new_post)
              with open(posts_path, "w") as f:
                  json.dump(posts, f, indent=2)
              print(f"Added post: {new_post['title']}")
          else:
              print("Post for today already exists, skipping.")
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "AutoTek Blog Bot"
          git config user.email "blog@autotek.com"
          git add data/posts.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Daily blog post: $(date +%Y-%m-%d)"
            git push
          fi
