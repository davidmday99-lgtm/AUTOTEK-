name: Daily Blog Post

on:
  schedule:
    - cron: '0 14 * * *'  # 9:00 AM Central Time (14:00 UTC)
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  generate-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate daily blog post
        run: |
          python3 << 'PYEOF'
          import json
          import datetime
          import os

          # 30 rotating blog post topics
          TOPICS = [
              {
                  "title": "Top 5 Diagnostic Mistakes That Cost Shops Money",
                  "category": "Tips & Tricks",
                  "content": "Every shop owner knows that diagnostic accuracy directly impacts profitability. Yet many shops continue to make avoidable mistakes that eat into their margins. The most common error is relying on code-only diagnosis without verifying with live data and functional tests. A code points you in a direction — it doesn't tell you what's broken.\n\nAnother costly mistake is skipping the basics. Before diving into advanced diagnostics, always check for TSBs, verify battery voltage, and inspect connections. A corroded ground wire can trigger dozens of seemingly unrelated codes and send a technician on a wild goose chase. Taking five minutes to verify the fundamentals can save hours of diagnostic time.\n\nFinally, investing in training pays dividends that far exceed the cost. The vehicles coming through your door today are more complex than anything we've seen before. A technician who understands how systems interact — not just how to read codes — is worth their weight in gold. Pair skilled technicians with professional-grade diagnostic tools, and your shop becomes unstoppable."
